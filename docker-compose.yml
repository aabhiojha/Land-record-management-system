services:
  db:
    image: postgres:16-alpine
    container_name: lrms-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-land-registry-db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${POSTGRES_DB:-land-registry-db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  storage:
    image: rustfs/rustfs:latest
    container_name: lrms-storage
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-lrms}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-lrms-secret}
    volumes:
      - storage:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend/land-record-management-backend
    container_name: lrms-backend
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-land-registry-db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # Change this in any real deployment. Must be >= 256 bits for HMAC-SHA256.
      JWT_SECRET: ${JWT_SECRET:-land-record-management-system-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256}
      # Object storage (RustFS). Documents live here, not on the container disk.
      S3_ENDPOINT: http://storage:9000
      S3_BUCKET: ${S3_BUCKET:-land-documents}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-lrms}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-lrms-secret}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: lrms-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    restart: unless-stopped

volumes:
  pgdata:
  storage:
