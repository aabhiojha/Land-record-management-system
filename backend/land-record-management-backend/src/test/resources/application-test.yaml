spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256-testing
    expiration-ms: 86400000
  upload:
    dir: ./test-uploads
