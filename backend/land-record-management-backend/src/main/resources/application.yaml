spring:
  application:
    name: land-record-management-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/land-registry-db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  jwt:
    secret: ${JWT_SECRET:land-record-management-system-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256}
    expiration-ms: 900000
  storage:
    # S3-compatible object storage (RustFS in Docker; MinIO or AWS S3 also work).
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    bucket: ${S3_BUCKET:land-documents}
    region: ${S3_REGION:us-east-1}
    access-key: ${S3_ACCESS_KEY:lrms}
    secret-key: ${S3_SECRET_KEY:lrms-secret}
